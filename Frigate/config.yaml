#Enables HTTPS authentication on port :8971
auth:
  enabled: true
  reset_admin_password: false
tls:
  enabled: true

mqtt:
  enabled: true
  host: 10.10.10.16 #<---Ip address of the MQTT SErver
  port: 1883
  user: mqttuser #<---Username for MQTT
  password: ********** #<---Password for the MQTT user
  topic_prefix: frigate

go2rtc:
  streams:
    livingroom:
      - rtsp://admin:[password]@[Camera IP]:554/h264Preview_01_main
      - ffmpeg:rtsp://admin:[password]@[Camera IP]:554/h264Preview_01_main
    front_door:
      - rtsp://admin:[password]@[Camera IP]:554/h264Preview_01_main
      - ffmpeg:rtsp://admin:[password]@[Camera IP]:554/h264Preview_01_main#audio=pcmu#hardware
    ffmpeg:
      bin: ffmpeg
      volume: -af "volume=30dB" #<---This helps with the 2way talk back audio making it not sound muffled on the doorbell speaker

  api:
  listen: :1984
  webrtc:
    candidates:
      - 10.10.10.20:8555
      - stun:stun.l.google.com:19302

cameras:
  livingroom:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://admin:[password]@[Camera IP]:554/h264Preview_01_sub
          roles:
            - detect
        - path: rtsp://admin:[password]@[Camera IP]:554/h264Preview_01_main
          roles:
            - record
            - audio
    record:
      enabled: true
      continuous:
        days: 30
      motion:
        days: 30
    motion:
      mask:
        - 0.324,0.019,0.656,0.019,0.654,0.052,0.324,0.047

  front_door:
    enabled: true
    ffmpeg:
      inputs:
        - path: rtsp://admin:[password]@[Camera IP]:554/h264Preview_01_sub
          roles:
            - detect
        - path: rtsp://admin:[password]@[Camera IP]:554/h264Preview_01_main
          roles:
            - record
            - audio
    record:
      enabled: true
      continuous:
        days: 30
      motion:
        days: 30
    motion:
      mask: 0.302,0.072,0.303,0,0.754,0,0.799,0.11,0.651,0.118,0.642,0.084
      threshold: 35
      contour_area: 10
      improve_contrast: true
snapshots:
  enabled: true
detect:
  enabled: true
objects:
  track:
    - person
    - cat
    - dog

ffmpeg: #<---For Intel iGPU graphics detection
  hwaccel_args:
    - -hwaccel
    - vaapi
    - -hwaccel_device
    - /dev/dri/renderD128
    - -hwaccel_output_format
    - yuv420p

detectors:
    cpu1:
        type: cpu

version: 0.17-0
